services:
  db:
    image: postgres:16-alpine
    container_name: bunbun_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - bunbun_data:/var/lib/postgresql/data

volumes:
  bunbun_data: